plugins {
    id 'java'
    id 'application'
    id 'com.diffplug.spotless' version '8.4.0'
}

group = 'de.ph4ntomic.prog2'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:6.0.0'
}

test {
    useJUnitPlatform()
}

application {
    mainClass = 'VersionCheck'
}

spotless {
    java {
        googleJavaFormat()
    }
}